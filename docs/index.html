<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transito CTBA — Curitiba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="css/style.css">
  <base href="/GTFSURBS/">
</head>
<body>
  <div id="map"></div>

  <button id="menu-toggle" aria-label="Abrir painel">
    <img src="img/open.png" alt="Menu">
  </button>

  <aside id="panel">
    <div class="panel-header">
      <img src="img/urbs.svg" alt="URBS" class="logo-urbs">
      <div class="brand-text">
        <h1>TRANSITO CTBA</h1>
        <p class="subtitle">transporte coletivo de Curitiba</p>
      </div>
    </div>

    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Buscar linha ou parada..." autocomplete="off">
    </div>
    <div id="search-results" class="search-results hidden"></div>

    <div class="filter-group">
      <label>Dia</label>
      <div class="day-selector" id="day-selector">
        <button data-day="weekday" class="active">Dias Úteis</button>
        <button data-day="saturday">Sábado</button>
        <button data-day="sunday">Domingo</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Tipo</label>
      <div class="type-filter" id="type-filter">
        <button data-type="all" class="active">Todas</button>
        <button data-type="3">Ônibus</button>
        <button data-type="11">Trolebus</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Paradas no mapa</label>
      <div class="toggle-row">
        <button id="toggle-clusters" class="toggle-btn">Ocultar</button>
      </div>
    </div>

    <div class="filter-group routes-list-group">
      <label>Linhas <span id="route-count"></span></label>
      <div class="routes-list" id="routes-list"></div>
    </div>

    <div class="panel-footer">
      <a href="http://urbs.curitiba.pr.gov.br" target="_blank" rel="noopener">Dados: URBS</a>
    </div>
  </aside>

  <div id="panel-overlay"></div>

  <div id="detail-panel" class="hidden">
    <button id="detail-close">&times;</button>
    <div id="detail-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
