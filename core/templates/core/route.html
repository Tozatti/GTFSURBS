<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roteirizador — Transito CTBA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body class="route-planner">
  <div id="map"></div>

  <!-- Painel lateral -->
  <aside id="panel" class="open">
    <div class="panel-header">
      <h1><span class="accent">//</span> ROTEIRIZADOR</h1>
      <p class="subtitle">transporte coletivo de Curitiba</p>
    </div>

    <!-- Formulário de origem -->
    <div class="route-inputs">
      <div class="input-group">
        <label for="origin-input">
          <span class="marker-dot origin"></span> Origem
        </label>
        <div class="coord-row">
          <input type="number" id="origin-lat" placeholder="Latitude" step="any">
          <input type="number" id="origin-lon" placeholder="Longitude" step="any">
        </div>
        <button class="map-pick-btn" id="pick-origin">Selecionar no mapa</button>
      </div>

      <div class="input-group">
        <label for="dest-input">
          <span class="marker-dest"></span> Destino
        </label>
        <div class="coord-row">
          <input type="number" id="dest-lat" placeholder="Latitude" step="any">
          <input type="number" id="dest-lon" placeholder="Longitude" step="any">
        </div>
        <button class="map-pick-btn" id="pick-dest">Selecionar no mapa</button>
      </div>

      <div class="swap-row">
        <button id="swap-coords" class="swap-btn" title="Inverter origem/destino">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <button id="plan-route" class="plan-btn">Calcular Rota</button>
      </div>
    </div>

    <!-- Modo de seleção -->
    <div id="pick-mode-bar" class="hidden">
      <span>Clique no mapa para definir o ponto</span>
      <button id="cancel-pick">Cancelar</button>
    </div>

    <!-- Resultados -->
    <div id="route-results" class="route-results hidden">
      <div class="route-summary" id="route-summary"></div>
      <div class="route-detail" id="route-detail"></div>
    </div>

    <!-- Status/erro -->
    <div id="route-status" class="route-status hidden"></div>

    <div class="panel-footer">
      <a href="/">Voltar ao mapa</a>
    </div>
  </aside>

  <div id="panel-overlay"></div>

  <button id="menu-toggle" aria-label="Abrir painel">
    <span></span><span></span><span></span>
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{% static 'core/js/route.js' %}"></script>
</body>
</html>
