<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transito CTBA — Curitiba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
  <div id="map"></div>

  <!-- Hamburger -->
  <button id="menu-toggle" aria-label="Abrir painel">
    <span></span><span></span><span></span>
  </button>

  <!-- Painel lateral -->
  <aside id="panel">
    <div class="panel-header">
      <h1><span class="accent">//</span> TRANSITO<br>CTBA</h1>
      <p class="subtitle"> transporte coletivo de Curitiba</p>
    </div>

    <!-- Busca -->
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Buscar linha ou parada..." autocomplete="off">
    </div>
    <div id="search-results" class="search-results hidden"></div>

    <!-- Filtro por dia -->
    <div class="filter-group">
      <label>Dia</label>
      <div class="day-selector" id="day-selector">
        <button data-day="weekday" class="active">Dias Úteis</button>
        <button data-day="saturday">Sábado</button>
        <button data-day="sunday">Domingo</button>
      </div>
    </div>

    <!-- Filtro por tipo -->
    <div class="filter-group">
      <label>Tipo</label>
      <div class="type-filter" id="type-filter">
        <button data-type="all" class="active">Todas</button>
        <button data-type="3">Ônibus</button>
        <button data-type="11">Trolebus</button>
      </div>
    </div>

    <!-- Lista de linhas -->
    <div class="filter-group routes-list-group">
      <label>Linhas <span id="route-count"></span></label>
      <div class="routes-list" id="routes-list"></div>
    </div>

    <!-- Footer -->
    <div class="panel-footer">
      <a href="http://urbs.curitiba.pr.gov.br" target="_blank" rel="noopener">Dados: URBS</a>
    </div>
  </aside>

  <!-- Overlay para fechar painel no mobile -->
  <div id="panel-overlay"></div>

  <!-- Popup de detalhes -->
  <div id="detail-panel" class="hidden">
    <button id="detail-close">&times;</button>
    <div id="detail-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="{% static 'core/js/app.js' %}"></script>
</body>
</html>
